<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ Flood Monitoring System</title>

<!-- Bootstrap & FontAwesome -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #0f2027);
    color: #fff;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 700;
    font-size: 2rem;
    color: #f8fafc;
}

.btn-back {
    display: inline-block;
    margin-bottom: 25px;
    background-color: #0d6efd;
    color: #fff;
    font-weight: 600;
    border-radius: 8px;
    padding: 8px 15px;
    text-decoration: none;
    text-align: center;
    transition: 0.3s;
}
.btn-back:hover {
    background-color: #0b5ed7;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#map {
    width: 100%;
    max-width: 1200px;
    height: 500px;
    border-radius: 15px;
    margin-bottom: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.table-wrapper {
    width: 100%;
    max-width: 1200px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    margin-bottom: 50px;
    overflow-x: auto;
}

.table-wrapper h4 {
    font-weight: 600;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    color: #fff;
}

thead th {
    background: rgba(0,123,255,0.9);
    color: #fff;
    text-align: center;
    font-weight: 600;
    padding: 10px;
    border-radius: 5px;
}

tbody tr {
    background: rgba(255,255,255,0.05);
    transition: transform 0.3s, background 0.3s;
}

tbody tr:hover {
    background: rgba(0,123,255,0.2);
    transform: scale(1.02);
}

.blink {
    animation: blink 1s infinite;
}
@keyframes blink {
    0%, 100% { opacity:1; }
    50% { opacity:0.2; }
}

.btn-alert {
    font-size: 0.85rem;
    padding: 5px 10px;
    font-weight: 600;
    border-radius: 8px;
    transition: 0.3s;
}
.btn-alert:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h2>🌧️ Real-Time Flood Monitoring Dashboard</h2>

<a href="/admin/dashboard" class="btn-back"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>

<div id="map"></div>

<div class="table-wrapper">
<h4 class="text-center">Registered Users Weather Live Data</h4>
<table class="table table-bordered table-striped table-hover text-center">
<thead>
<tr>
  <th>Name</th>
  <th>Latitude</th>
  <th>Longitude</th>
  <th>Temperature (°C)</th>
  <th>Precipitation (mm)</th>
  <th>River Discharge (m³/s)</th>
  <th>River Level (m)</th>
  <th>River Status</th>
  <th>Cyclone</th>
  <th>Weather</th>
  <th>Status</th>
  <th>Time</th>
  <th>Alert</th>
</tr>
</thead>
<tbody id="weatherTable"></tbody>
</table>
</div>

<script>
const apiKey = "fb116bebc392ccc8ab251927edcb55d6";

const map = L.map("map").setView([20.5937, 78.9629], 5);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = {};

async function loadUsers() {
    try {
        const req = await fetch("/api/get_users_locations");
        return await req.json();
    } catch (err) {
        console.error("Failed to load users:", err);
        return [];
    }
}

function calculateRiverLevel(discharge, riverType = "medium") {

    const defaults = {
        small: 0.35,
        medium: 0.70,
        large: 1.50
    };

    if (!discharge || discharge <= 0) {
        return defaults[riverType] ?? 0.70;
    }

    const coeffMap = {
        small:  { a: 0.18, b: 0.48, bed: 0.35 },
        medium: { a: 0.22, b: 0.44, bed: 0.70 },
        large:  { a: 0.14, b: 0.40, bed: 1.50 }
    };

    const { a, b, bed } = coeffMap[riverType] ?? coeffMap.medium;

    let level = bed + a * Math.pow(discharge, b);

    // Safety clamp
    level = Math.max(bed, Math.min(level, 30));

    return Number(level.toFixed(2));
}

async function fetchRiverDischarge(lat, lon) {
    try {
        const url = `https://flood-api.open-meteo.com/v1/flood?latitude=${lat}&longitude=${lon}&daily=river_discharge&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();

        const discharge = data.daily?.river_discharge?.[0] ?? 0;
        const level = calculateRiverLevel(discharge);

        let status = "Safe";
        if (level >= 7 || discharge >= 7000) status = "High Flood Risk";
        else if (level >= 6 || discharge >= 5000) status = "Moderate Risk";

        return {
            discharge,   // ✅ NUMBER
            level,       // ✅ NUMBER
            status
        };
    } catch (e) {
        return { discharge: 0, level: 0, status: "Unavailable" };
    }
}



async function loadWeather() {
    const users = await loadUsers();
    const table = document.getElementById("weatherTable");

    table.innerHTML = "";

    // Remove old markers
    for (const key in markers) map.removeLayer(markers[key]);
    markers = {};

    for (let u of users) {
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${u.lat}&lon=${u.lon}&appid=${apiKey}&units=metric`;
        const res = await fetch(url);
        const data = await res.json();
        const windSpeed = (data.wind?.speed || 0) * 3.6; // m/s → km/h
const pressure = data.main?.pressure || 1013;

const cycloneDetected = (
    windSpeed >= 62 || pressure <= 990
);


        const temp = data.main.temp;
        const weather = data.weather[0].description;
        const precipitation = data.rain ? data.rain["1h"] || 0 : 0;
        const humidity = data.main.humidity || 0;
        const time = new Date().toLocaleTimeString();

        const status = precipitation > 20 ? "High Risk" :
                       precipitation > 5 ? "Moderate Risk" :
                       precipitation > 0 ? "Low Risk" : "No Rain";

        const color = status === "High Risk" ? "red" :
                      status === "Moderate Risk" ? "orange" :
                      status === "Low Risk" ? "green" : "blue";

const river = await fetchRiverDischarge(u.lat, u.lon);

        const marker = L.circleMarker([u.lat, u.lon], {
            color: color,
            fillColor: color,
            fillOpacity: 0.7,
            radius: 8
        }).addTo(map)
          .bindPopup(`
    <b>${u.name}</b><br>
    🌡️ Temp: ${temp}°C<br>
    🌧️ Rain: ${precipitation} mm<br>
    💧 Humidity: ${humidity}%<br><br>

    <b>🌪 Cyclone Info</b><br>
    💨 Wind: ${windSpeed.toFixed(1)} km/h<br>
    ⬇️ Pressure: ${pressure} hPa<br>
    Status: ${cycloneDetected ? 'Cyclonic Influence' : 'Normal'}<br><br>

    <b>Flood Status:</b> ${status}
`);

        if (status === "High Risk" || cycloneDetected) {
    marker._path.classList.add('blink');
}

        markers[u.id] = marker;

table.innerHTML += `
<tr>
    <td>${u.name}</td>
    <td>${u.lat}</td>
    <td>${u.lon}</td>
    <td>${temp}</td>
    <td>${precipitation}</td>

    <!-- River -->
<td>${river.discharge.toFixed(2)}</td>
<td>${river.level.toFixed(2)}</td>
<td class="${
    river.status.includes('High') ? 'text-danger fw-bold blink' :
    river.status.includes('Moderate') ? 'text-warning fw-bold' :
    'text-success'
}">${river.status}</td>


    <!-- Weather -->
        <td class="${cycloneDetected ? 'text-primary fw-bold' : 'text-success'}">
    ${cycloneDetected ? '🌪️ Yes' : 'No'}
</td>
    <td>${weather}</td>



    <!-- Overall Status -->
    <td class="${
    status === 'High Risk' ? 'text-danger fw-bold' :
    status === 'Moderate Risk' ? 'text-warning fw-bold' :
    'text-success'
}">
${status}
</td>


    <td>${time}</td>
    <td>
        <button class="btn btn-warning btn-alert" onclick="sendAlert(${u.id}, '${u.name}')">
            <i class="fa fa-bell"></i> Alert
        </button>
    </td>
</tr>
        `;
    }

    // Fit map to all markers
    const group = new L.featureGroup(Object.values(markers));
    if (Object.keys(markers).length > 0) map.fitBounds(group.getBounds().pad(0.2));
}

function sendAlert(userId, name) {
    fetch(`/send_alert/${userId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: "Please take precautionary measures." })
    })
    .then(res => res.json())
    .then(data => alert(`🚨 ${data.status === 'success' ? 'Alert sent to '+name : 'Failed to send alert!'}`))
    .catch(err => alert("❌ Network error: " + err));
}

loadWeather();
setInterval(loadWeather, 60000);
</script>

</body>
</html>
